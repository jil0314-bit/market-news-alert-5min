# GitHub Actions 전용 설정. 비밀 토큰은 이 파일에 쓰지 말고 GitHub Secrets에 넣습니다.
telegram:
  enabled: true
  bot_token: ""
  chat_id: ""
  disable_web_page_preview: true

runtime:
  timezone: "Asia/Seoul"
  mode_name: "글로벌 시장영향 5분 속보"
  sqlite_path: "data/seen_news.sqlite3"
  log_path: "logs/market_news_alert.log"
  max_items_per_message: 3
  max_news_age_minutes: 90
  request_timeout_sec: 15
  user_agent: "Mozilla/5.0 MarketNewsAlertBot/2.0 (+personal market monitoring)"

polling:
  market_open: "08:30"
  market_close: "15:45"
  market_interval_sec: 60
  normal_interval_sec: 300
  weekend_interval_sec: 900

filters:
  min_score_to_send: 4
  urgent_score: 12
  require_relevance_signal: true
  duplicate_title_similarity: 0.88

# 매체/공식기관 이름이 source에 들어가면 소폭 가산
source_bonuses:
  "연준": 4
  "Federal Reserve": 4
  "SEC": 3
  "Reuters": 3
  "Financial Times": 3
  "FT-Alphaville": 3
  "한국경제": 2
  "매일경제": 2
  "인베스팅": 1
  "Bloomberg": 3
  "CNBC": 2
  "Wall Street Journal": 3
  "WSJ": 3
  "AP": 2

# 주요 인사/기관 이름과 발언·전망 단어가 같이 있어야 강하게 점수를 줍니다.
combination_rules:
  policy_speaker:
    label: "미국 정책결정자 발언"
    score: 8
    subjects:
      - "Kevin Warsh"
      - "캐빈 워시"
      - "케빈 워시"
      - "Jerome Powell"
      - "제롬 파월"
      - "파월"
      - "Scott Bessent"
      - "스콧 베선트"
      - "베선트"
      - "Federal Reserve"
      - "연준"
      - "FOMC"
      - "미 재무부"
      - "U.S. Treasury"
      - "White House"
      - "백악관"
      - "U.S. President"
      - "미국 대통령"
      - "Treasury Secretary"
      - "재무장관"
      - "Christine Lagarde"
      - "크리스틴 라가르드"
      - "ECB"
      - "European Central Bank"
