keyword_scores:
  critical:
    score: 9
    words: ["거래정지", "상장폐지", "감사의견 거절", "횡령", "배임", "부도", "전쟁", "공습", "미사일", "금융위기", "emergency", "war", "attack"]
  bad:
    score: 6
    words: ["유상증자", "전환사채", "감자", "리콜", "임상 실패", "FDA 반려", "수출규제", "관세", "제재", "금리 급등", "환율 급등", "유가 급등", "downgrade", "recession", "tariff", "sanction"]
  good:
    score: 5
    words: ["단일판매", "공급계약", "수주", "FDA 승인", "품목허가", "임상 성공", "실적 서프라이즈", "자사주 매입", "투자 확대", "수출 호조", "upgrade", "beats estimates", "approval"]
  market:
    score: 4
    words: ["FOMC", "파월", "연준", "CPI", "PCE", "고용지표", "미국 10년물", "국채금리", "달러인덱스", "원달러", "나스닥 선물", "S&P500 선물", "엔비디아", "마이크론", "테슬라", "Federal Reserve", "inflation", "interest rates", "Treasury yields"]

