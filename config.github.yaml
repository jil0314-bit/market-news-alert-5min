sources:
  naver:
    enabled: false
    client_id: ""
    client_secret: ""
    display: 30
    sort: "date"
    queries:
      - "미국 연준 파월 캐빈 워시 베선트 발언"
      - "골드만삭스 JP모건 모건스탠리 블랙록 전망"
      - "글로벌 CEO 산업 전망 반도체 AI 에너지"
      - "삼성전자 SK하이닉스 엔비디아 반도체"
      - "미국 금리 환율 달러 유가 관세 수출규제"
      - "FDA 임상 승인 실패 바이오"
      - "2차전지 배터리 전기차 테슬라"
      - "원전 조선 방산 로봇 AI 전력기기"

  dart:
    enabled: false
    api_key: ""
    corp_cls: ""
    days_back: 1
    important_report_keywords:
      - "유상증자"
      - "전환사채"
      - "신주인수권부사채"
      - "단일판매"
      - "공급계약"
      - "최대주주"
      - "거래정지"
      - "상장폐지"
      - "횡령"
      - "배임"
      - "감사의견"

  rss:
    enabled: true
    feeds:
      # 국내 종합
      - name: "한국경제-증권"
        url: "https://www.hankyung.com/feed/finance"
        priority: 3
      - name: "한국경제-경제"
        url: "https://www.hankyung.com/feed/economy"
        priority: 2
      - name: "한국경제-국제"
        url: "https://www.hankyung.com/feed/international"
        priority: 2
      - name: "매일경제-헤드라인"
        url: "https://www.mk.co.kr/rss/30000001/"
        priority: 3
      - name: "매일경제-경제"
        url: "https://www.mk.co.kr/rss/30100041/"
        priority: 2
      - name: "인베스팅-주식시장"
        url: "https://www.investing.com/rss/news_25.rss"
        priority: 2
      - name: "인베스팅-경제지표"
        url: "https://www.investing.com/rss/news_95.rss"
        priority: 2

      # 미국 공식기관: 뉴스보다 원문이 빠르고 신뢰도가 높음
      - name: "Federal Reserve-전체보도"
        url: "https://www.federalreserve.gov/feeds/press_all.xml"
        priority: 5
      - name: "Federal Reserve-통화정책"
        url: "https://www.federalreserve.gov/feeds/press_monetary.xml"
        priority: 5
      - name: "Federal Reserve-연설증언"
        url: "https://www.federalreserve.gov/feeds/speeches_and_testimony.xml"
        priority: 5
      - name: "SEC-보도자료"
        url: "https://www.sec.gov/news/pressreleases.rss"
        priority: 4
      - name: "SEC-연설성명"
        url: "https://www.sec.gov/news/speeches-statements.rss"
        priority: 4

      # Reuters/FT 원문을 무단 크롤링하지 않고 Google News의 제목·링크 검색 피드로 보조 수집
      - name: "GoogleNews-Reuters-시장"
        url: "https://news.google.com/rss/search?q=site%3Areuters.com+%28markets+OR+stocks+OR+Fed+OR+inflation+OR+tariffs+OR+semiconductors+OR+oil%29&hl=en-US&gl=US&ceid=US:en"
        priority: 3
      - name: "GoogleNews-Financial-Times"
