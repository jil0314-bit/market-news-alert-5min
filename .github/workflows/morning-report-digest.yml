name: 아침 증권사 리포트

on:
  workflow_dispatch:
  schedule:
    # 한국시간 평일 오전 7시 25분 = UTC 전날 22시 25분
    - cron: '25 22 * * 0-4'

permissions:
  contents: write

concurrency:
  group: morning-report-digest
  cancel-in-progress: true

jobs:
  reports:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
      - name: 코드 받기
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 파이썬 준비
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: 필요한 부품 설치
        run: python -m pip install requests beautifulsoup4 python-dateutil

      - name: 텔레그램 비밀값 확인
        shell: bash
        run: |
          test -n "$TELEGRAM_BOT_TOKEN" || (echo "TELEGRAM_BOT_TOKEN이 비어 있습니다." && exit 1)
          test -n "$TELEGRAM_CHAT_ID" || (echo "TELEGRAM_CHAT_ID가 비어 있습니다." && exit 1)

      - name: 수동 실행 연결 시험
        if: github.event_name == 'workflow_dispatch'
        run: python report_digest.py --test

      - name: 새 증권사 리포트 발송
        run: python report_digest.py --run

      - name: 중복방지 기록 저장
        shell: bash
        run: |
          if [ -f data/seen_reports.json ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/seen_reports.json
            if ! git diff --cached --quiet; then
              git commit -m "chore: update report digest state [skip ci]"
              git push
            fi
          fi
